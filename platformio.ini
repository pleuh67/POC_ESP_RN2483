; ============================================================
; POC_ESP_2483 - ESP32-S3 + RN2483 LoRaWAN OTAA - Orange
; ============================================================
[env:esp32s3]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino

; Vitesse monitor
monitor_speed = 115200

; Librairies
lib_deps =
  jpmeijers/RN2xx3 Arduino Library
  adafruit/Adafruit NeoPixel @ ^1.12.3

; Optionnel : flags de build
build_flags =
  -DCORE_DEBUG_LEVEL=3
